<div class="se-sph-card">
    <div class="se-sph-card-label">{{label}}</div>
    {{warnHtml}}
    <textarea class="se-fr-input se-sph-textarea" rows="5" data-prompt-key="{{key}}" data-default-text="{{defaultText}}">{{promptText}}</textarea>
    <div class="se-sph-card-foot">
        <button class="se-btn se-btn-sm se-ep-reset-btn se-sph-reset" data-reset-key="{{key}}">Reset</button>
    </div>
</div>
