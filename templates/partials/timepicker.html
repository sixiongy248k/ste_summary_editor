<div class="se-timepicker">
    <select class="se-tp-hour">{{hourOpts}}</select>
    <span class="se-tp-sep">:</span>
    <select class="se-tp-minute">{{minOpts}}</select>
    <div class="se-tp-ampm">
        <button type="button" class="se-tp-toggle{{amActiveClass}}" data-val="AM">AM</button>
        <button type="button" class="se-tp-toggle{{pmActiveClass}}" data-val="PM">PM</button>
    </div>
</div>
