<div class="se-datepicker" data-sel-month="{{month}}" data-sel-day="{{day}}" data-sel-year="{{year}}">
    <div class="se-dp-header">
        <button class="se-dp-nav se-dp-prev" type="button">&#8249;</button>
        <select class="se-dp-month">{{monthOpts}}</select>
        <select class="se-dp-year">{{yearOpts}}</select>
        <button class="se-dp-nav se-dp-next" type="button">&#8250;</button>
    </div>
    <div class="se-dp-daynames"></div>
    <div class="se-dp-days"></div>
</div>
