<div class="se-float-panel se-fp-wide">
    <div class="se-float-panel-header">
        <span class="se-float-panel-title">Tag Browser</span>
        <button class="se-close-circle se-dialog-close" title="Close">&times;</button>
    </div>
    <div class="se-float-panel-body" style="padding:0;">
        <div class="se-tb-tabs">{{tabsHtml}}</div>
        <div class="se-tb-body">{{panelsHtml}}</div>
    </div>
    <div class="se-float-panel-actions">
        <button class="se-btn se-btn-warn se-btn-sm se-tb-clear-section" data-tb-field="{{firstField}}">Clear {{firstLabel}}</button>
        <button class="se-btn se-btn-warn se-btn-sm se-tb-clear-all">Clear All Tags</button>
        <button class="se-btn se-btn-primary se-dialog-ok">Done</button>
    </div>
</div>
