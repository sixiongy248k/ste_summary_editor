<div class="se-float-panel se-story-ctx-panel" id="se-story-ctx-panel">
    <div class="se-float-panel-header">
        <span class="se-float-panel-title">&#x1F4D6; Story Context</span>
        <button class="se-close-circle se-story-ctx-close" title="Close">&times;</button>
    </div>
    <div class="se-story-ctx-hint">
        Auto-generated narrative summary sent as context with every conflict check. Edit to fix inaccuracies.
    </div>
    <textarea class="se-story-ctx-textarea" id="se-story-ctx-textarea" placeholder="No story context yet — run Check Conflicts to generate one automatically.">{{body}}</textarea>
    <div class="se-story-ctx-footer">
        <button class="se-btn se-btn-primary se-btn-sm" id="se-story-ctx-save">Save</button>
        <span class="se-story-ctx-saved" id="se-story-ctx-saved" style="display:none;">Saved ✓</span>
    </div>
</div>
