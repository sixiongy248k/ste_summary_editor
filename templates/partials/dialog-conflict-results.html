<div class="se-float-panel se-fp-results">
    <div class="se-float-panel-header">
        <span class="se-float-panel-title">Conflict Analysis Results</span>
        <button class="se-close-circle se-dialog-ok" title="Close">&times;</button>
    </div>
    <div class="se-float-panel-body" id="se-cr-body">{{bodyHtml}}</div>
    <div class="se-float-panel-actions">
        <button class="se-btn se-btn-sm" id="se-cr-story-ctx-btn" title="View / edit the narrative story context sent with conflict checks">&#x1F4D6; Story Context</button>
        <button class="se-prompt-edit-btn" data-edit-prompt="story-context" title="Edit story context generation prompt">&#9881;</button>
        <button class="se-btn se-btn-primary se-dialog-ok">Close</button>
    </div>
</div>
