<div class="se-float-panel{{wideCls}}">
    <div class="se-float-panel-header">
        <span class="se-float-panel-title">{{title}}</span>
        <button class="se-close-circle se-dialog-dismiss" title="Close">&times;</button>
    </div>
    <div class="se-float-panel-body">{{body}}</div>
    <div class="se-float-panel-actions">
        {{cancelBtn}}
        <button class="se-btn se-btn-primary se-dialog-ok">{{okText}}</button>
    </div>
</div>
