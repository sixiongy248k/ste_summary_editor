name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: build_extension_pkgs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create extension ZIP
        run: |
          SAFE_REF=$(echo "$GITHUB_REF_NAME" | tr '/' '-')
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ZIP_NAME="summary-editor-${SAFE_REF}-${SHORT_SHA}.zip"
          zip -r "$ZIP_NAME" . \
            --exclude ".git/*" \
            --exclude "node_modules/*" \
            --exclude ".github/*" \
            --exclude "*.zip" \
            --exclude "*.log" \
            --exclude "key.pat" \
            --exclude ".scannerwork/*"
          echo "SAFE_REF=$SAFE_REF" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-editor-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: "*.zip"
          retention-days: 14
